name = "tests"
description = "Testsuite for files"
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT OR Apache-2.0 WITH LLVM-exception"
website = ""
tags = ["tests"]

executables = ["tests"]

[[depends-on]]
gnat_native = "=15.2.1"

[[depends-on]]
files = "*"

[[pins]]
files = { path = "../.." }

[[depends-on]]
project_tools = "*"

[[pins]]
project_tools = { path = "../../../project_tools" }

# Pins are root-only in Alire: this root builds zlib (via files), so it must
# pin cryptolib too.
[[pins]]
cryptolib = { path = "../../../cryptolib" }

[[depends-on]]
aunit = "^26.0.0"
