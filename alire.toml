name = "files"
description = "Desktop file manager"
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT OR Apache-2.0 WITH LLVM-exception"
website = "https://github.com/bracke/files"
tags = ["filemanager"]

executables = ["files"]

[[depends-on]]
gnat_native = "=15.2.1"

[[depends-on]]
i18n = "*"

[[depends-on]]
hostkit = "*"

[[pins]]
hostkit = { path = "../hostkit" }
i18n = { path = "../i18n" }

[[depends-on]]
textrender = "*"

[[pins]]
textrender = { path = "../textrender" }

[[depends-on]]
zlib = "*"

[[pins]]
zlib = { path = "../zlib" }

[[depends-on]]
guikit = "*"

[[pins]]
guikit = { path = "../guikit" }

# zlib depends on cryptolib, but Alire honours pins only in the root crate, so
# every root that builds zlib must pin it too.
[[pins]]
cryptolib = { path = "../cryptolib" }

[[depends-on]]
df_vulkan = "~0.1.0"

[[depends-on]]
openglada_glfw = "~0.9.0"

[[depends-on]]
utilada = "^2.9.0"

# Build dependencies in the development profile (-Og) too, not the default
# release (-O3). guikit is shared by files and launcher, and the profile lives in
# its generated config gpr: if one root built it at -O3 and the other at -Og, each
# switch would silently force a full guikit rebuild. Keeping every root on the same
# profile lets them share object files.
[build-profiles]
"*" = "development"
