name: CI

# Builds the file manager and runs the AUnit test suite on Linux, macOS, and
# Windows (full cross-platform support is a project goal).
#
# PREREQUISITE: this project pins four sibling crates by local path in
# alire.toml (project_tools, i18n, textrender, zlib). CI clones them next to
# the checkout. They must therefore exist as fetchable GitHub repos under the
# same owner. As of writing, `textrender` is published but `project_tools`,
# `i18n`, and `zlib` are NOT — push them to github.com/<owner>/<name> (or
# adjust the clone URLs below) before this workflow can succeed.
#
# The Linux job also runs a live GPU smoke: the full GLFW + Vulkan render path
# under Xvfb with the Mesa lavapipe software ICD, structurally analysing the
# read-back framebuffer (exit 77 = skipped, non-fatal).
#
# NOTE: the Linux job is validated and green. Windows has now run on a real
# runner: every Ada unit compiles and only the link step needed native
# libraries (see the Windows setup step). macOS has still never executed --
# its jobs sat unscheduled on the retired macos-13 image -- so the macOS
# dependency setup and FILES_FONT_PATH value below remain unverified.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # An x86_64 macOS image is required: gnat_native=15.2.1 ships no
        # aarch64-darwin binary, so macos-latest (arm64) cannot resolve the pin.
        # macos-13 was retired on 2025-12-04 and its jobs now queue forever with
        # no runner; macos-15-intel replaces it and is the last x86_64 image
        # Actions will offer (available until August 2027).
        os: [ubuntu-latest, macos-15-intel, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: files

      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            fonts-dejavu-core \
            mesa-vulkan-drivers \
            xvfb \
            libxcursor-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev

      - name: Install system libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          # MoltenVK provides the Vulkan loader/ICD on macOS. gdk-pixbuf (which
          # pulls in glib) satisfies files.gpr's thumbnail-decoding switches. No
          # compression library is needed -- the zlib sibling crate's codecs are
          # all pure Ada.
          brew install vulkan-headers vulkan-loader molten-vk glfw gdk-pixbuf

          # Homebrew on the x86_64 runner installs under /usr/local, which is not
          # on the linker's default search path.
          echo "LIBRARY_PATH=$(brew --prefix)/lib" >> "$GITHUB_ENV"

      - name: Install system libraries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Alire's gnat_native is a mingw-w64 toolchain, so its `ld` needs mingw
          # import libraries (libvulkan.dll.a). The chocolatey vulkan-sdk ships
          # MSVC .lib files, which that linker cannot use -- take every library
          # from the MSYS2 installation preinstalled on the runner instead.
          #
          # vulkan-loader/glib2/gdk-pixbuf2 satisfy files.gpr's Windows linker
          # switches. No compression library is needed: the zlib sibling crate
          # implements every codec it supports -- Deflate, LZMA, PPMd, bzip2 and
          # zstd -- in Ada, and links none of them.
          pacman() { /c/msys64/usr/bin/pacman "$@"; }
          pacman -Sy --noconfirm --needed \
            mingw-w64-x86_64-vulkan-loader \
            mingw-w64-x86_64-glib2 \
            mingw-w64-x86_64-gdk-pixbuf2

          # ld resolves -l<name> through LIBRARY_PATH; the DLLs must also be on
          # PATH for the test binary and the live app to start.
          echo "LIBRARY_PATH=C:/msys64/mingw64/lib" >> "$GITHUB_ENV"
          echo "C:\msys64\mingw64\bin" >> "$GITHUB_PATH"

      - name: Clone sibling crate dependencies
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          owner="${{ github.repository_owner }}"
          git clone --depth 1 "https://github.com/${owner}/project_tools.git" project_tools
          git clone --depth 1 "https://github.com/${owner}/i18n.git" i18n
          git clone --depth 1 "https://github.com/${owner}/textrender.git" textrender
          git clone --depth 1 "https://github.com/${owner}/zlib.git" zlib
          git clone --depth 1 "https://github.com/${owner}/guikit.git" guikit
          git clone --depth 1 "https://github.com/${owner}/cryptolib.git" cryptolib

      - name: Set up Alire
        # v5 defaults to alr 2.1.0, whose index carries gnat_native 15.2.1.
        # v4 pins alr 2.0.2, whose older index cannot resolve it.
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild

      - name: Build the application
        shell: bash
        working-directory: files
        run: alr --non-interactive build

      - name: Build and run the test suite
        shell: bash
        working-directory: files/tests
        env:
          # The headless suite exercises font discovery; point it at a known
          # system font on macOS/Windows where the Linux font paths don't apply.
          FILES_FONT_PATH: >-
            ${{ runner.os == 'macOS' && '/System/Library/Fonts/Supplemental/Arial.ttf'
            || runner.os == 'Windows' && 'C:/Windows/Fonts/consola.ttf'
            || '' }}
        run: |
          alr --non-interactive build
          ./bin/tests

      - name: Live GPU smoke (Linux, software Vulkan)
        # Exercises the full GLFW + Vulkan render path headlessly under Xvfb with
        # the Mesa lavapipe software ICD, then structurally analyses the read-back
        # framebuffer. Exit 0 = pass, 1 = degenerate frame (fails the job),
        # 77 = skipped (no display/Vulkan) which is treated as non-fatal.
        if: runner.os == 'Linux'
        shell: bash
        working-directory: files
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          set +e
          xvfb-run -a ./bin/files --live-smoke
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "live-smoke passed the structural framebuffer analysis"
          elif [ "$code" -eq 77 ]; then
            echo "::warning::live-smoke skipped (no display/Vulkan device available)"
          else
            echo "::error::live-smoke failed the structural analysis (exit $code)"
            exit "$code"
          fi
